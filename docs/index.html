<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoutineTalk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1.125rem;
      color: #444444;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .coming-soon {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888888;
      border: 1px solid #dddddd;
      border-radius: 100px;
      padding: 0.4rem 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RoutineTalk</h1>
    <p class="tagline">Skincare and makeup routines you can shop in one tap.</p>
    <span class="coming-soon">Coming soon</span>
  </div>
</body>
</html>
